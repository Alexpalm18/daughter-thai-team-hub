<style>

.sub{font-size:11px;color:#999;margin-top:1px}
.container{max-width:820px;margin:0 auto;padding:0 16px 40px 16px}

/* ── SECTION ── */
.sec-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb;margin:16px 0 10px 0}

var activeTab="all";

/* tag badge html */
function tagBadges(tags){
  if(!tags||!tags.length) return '';
  var map={GF:'<span class="tag tag-gf">GF</span>',GFO:'<span class="tag tag-gfo">GFO</span>',V:'<span class="tag tag-v">V</span>',VO:'<span class="tag tag-vo">VO</span>',PFO:'<span class="tag tag-pfo">PFO</span>'};
  var h='';for(var i=0;i<tags.length;i++) h+=map[tags[i]]||'';
  return h;
}

/* allergen badge html */
function alBadges(als){
  if(!als||!als.length) return '';
  var map={wheat:'<span class="al al-wheat">Wheat</span>',soy:'<span class="al al-soy">Soy</span>',peanut:'<span class="al al-peanut">Peanut</span>',shellfish:'<span class="al al-shellfish">Shellfish</span>',egg:'<span class="al al-egg">Egg</span>',sesame:'<span class="al al-sesame">Sesame</span>',dairy:'<span class="al al-dairy">Dairy</span>',gluten:'<span class="al al-gluten">Gluten</span>',fish:'<span class="al al-fish">Fish</span>',mushroom:'<span class="al al-mushroom">Mushroom</span>',oyster:'<span class="al al-oyster">Oyster</span>',crab:'<span class="al al-crab">Crab</span>'};
  var h='<div class="al-row">';for(var i=0;i<als.length;i++) h+=map[als[i]]||'';h+='</div>';
  return h;
}

function makeDC(d){
  var c=CAT[d.cat];
  var badge='<span class="dc-cat" style="background:'+c.bg+';color:'+c.tc+'">'+c.label+'</span>';
  var tagH=tagBadges(d.tags);

  var front=badge+'<span class="dc-name">'+d.name+'</span>'+(tagH?'<div class="dc-tag-row">'+tagH+'</div>':'')+'<span class="dc-hint">Tap to see details &#9654;</span>';

  var back=badge+'<span class="dc-name">'+d.name+'</span>'+(tagH?'<div class="dc-tag-row">'+tagH+'</div>':'');
  if(d.pieces) back+='<span class="dc-pieces">'+d.pieces+'</span>';
  if(d.ingr) back+='<div class="dc-ingr-box">'+d.ingr+'</div>';
  back+='<hr class="dc-divider">';
  if(d.sauces_served) back+='<span class="dc-method" style="color:#888">Served with: '+d.sauces_served+'</span>';
  if(d.method) back+='<span class="dc-method">'+d.method+'</span>';
  if(d.choices) back+='<div class="dc-choices">'+d.choices+'</div>';
  if(d.server_note) back+='<div class="dc-server-note">&#9432; '+d.server_note+'</div>';
  back+=alBadges(d.allergens);
  back+='<span class="dc-flip">Tap to flip back</span>';

  return '<div class="dc" onclick="toggleDC(this)">'
    +'<div class="dc-front" style="display:flex">'+front+'</div>'
    +'<div class="dc-back" style="display:none">'+back+'</div>'
    +'</div>';
}

function toggleDC(el){
  var f=el.querySelector('.dc-front'),b=el.querySelector('.dc-back');
  if(f.style.display==='none'){f.style.display='flex';b.style.display='none';}
  else{f.style.display='none';b.style.display='flex';}
}

function showTab(t,btn){
  activeTab=t;
  document.getElementById('search-input').value='';
  document.getElementById('search-results').style.display='none';
  document.getElementById('tab-content').style.display='';
  document.querySelectorAll('.nav-btn').forEach(function(b){b.className='nav-btn';});
  if(btn) btn.className='nav-btn on';
  renderTab();
}

function renderTab(){
  var tc=document.getElementById('tab-content');
  if(activeTab==='allergen'){tc.innerHTML=renderAllergenTab();return;}
  if(activeTab==='sauces'){tc.innerHTML=renderSaucesTab();return;}
  var list=activeTab==='all'?DISHES:DISHES.filter(function(d){return d.cat===activeTab;});
  if(!list.length){tc.innerHTML='<div class="no-results">No dishes in this category.</div>';return;}
  if(activeTab==='all'){
    var order=["appetizer","soup","salad","special","noodle","curry","street","dessert"];
    var groups={};
    for(var i=0;i<list.length;i++){var d=list[i];if(!groups[d.cat])groups[d.cat]=[];groups[d.cat].push(d);}
    var html='';
    for(var ci=0;ci<order.length;ci++){
      var cat=order[ci];
      if(!groups[cat]) continue;
      html+='<div class="sec-label">'+CAT[cat].label+'</div><div class="grid">';
      for(var di=0;di<groups[cat].length;di++) html+=makeDC(groups[cat][di]);
      html+='</div>';
    }
    tc.innerHTML=html;
  } else {
    var html='<div class="grid">';
    for(var i=0;i<list.length;i++) html+=makeDC(list[i]);
    html+='</div>';
    tc.innerHTML=html;
  }
}

function renderAllergenTab(){
  var tagMap={GF:'<span class="tag tag-gf">GF</span>',GFO:'<span class="tag tag-gfo">GFO</span>',V:'<span class="tag tag-v">V</span>',VO:'<span class="tag tag-vo">VO</span>',PFO:'<span class="tag tag-pfo">PFO</span>'};
  var html='';
  // legend
  html+='<div class="sec-label">Key</div>';
  html+='<div class="legend-row">'
    +'<div class="legend-item"><span class="tag tag-gf">GF</span> Gluten-Free</div>'
    +'<div class="legend-item"><span class="tag tag-gfo">GFO</span> GF Option Available</div>'
    +'<div class="legend-item"><span class="tag tag-v">V</span> Vegan</div>'
    +'<div class="legend-item"><span class="tag tag-vo">VO</span> Vegan Option Available</div>'
    +'<div class="legend-item"><span class="tag tag-pfo">PFO</span> Peanut-Free Option Available</div>'
    +'</div>';
  html+='<div style="font-size:11px;color:#888;margin-bottom:14px;line-height:1.6">GF option: stir-fry sauce is replaced with fish sauce, salt, and sugar for all applicable dishes.</div>';

  for(var si=0;si<ALLERGEN_SECTIONS.length;si++){
    var sec=ALLERGEN_SECTIONS[si];
    html+='<div class="al-section-header">';
    html+='<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:'+sec.color+';color:'+sec.tc+'">'+sec.section+'</span>';
    html+='<span class="al-section-count">'+sec.dishes.length+' items</span>';
    html+='</div>';
    for(var di=0;di<sec.dishes.length;di++){
      var dish=sec.dishes[di];
      var tags='';for(var ti=0;ti<dish.tags.length;ti++) tags+=tagMap[dish.tags[ti]]||'';
      html+='<div class="dish-row">';
      html+='<div><div class="dish-row-name">'+dish.name+'</div>'+(tags?'<div class="dish-tags">'+tags+'</div>':'')+'</div>';
      html+='<div class="dish-row-al">'+dish.al.join(' · ')+'</div>';
      html+='</div>';
    }
  }
  return html;
}

function renderSaucesTab(){
  var html='<div class="sec-label">House Sauces & Curry Pastes</div>';
  for(var i=0;i<SAUCES.length;i++){
    var s=SAUCES[i];
    html+='<div class="sauce-card"><div class="sauce-header" onclick="toggleSauce(this)"><span class="sauce-name">'+s.name+'</span><span class="sauce-arrow">&#9654;</span></div><div class="sauce-body" style="display:none">'+s.ingr+'</div></div>';
  }
  return html;
}

function toggleSauce(hdr){
  var body=hdr.parentNode.querySelector('.sauce-body');
  var arrow=hdr.querySelector('.sauce-arrow');
  if(body.style.display==='none'){body.style.display='block';arrow.style.transform='rotate(90deg)';}
  else{body.style.display='none';arrow.style.transform='rotate(0deg)';}
}

function doSearch(q){
  var sr=document.getElementById('search-results');
  var tc=document.getElementById('tab-content');
  q=q.trim().toLowerCase();
  if(!q){sr.style.display='none';tc.style.display='';return;}
  tc.style.display='none';sr.style.display='';
  var results=DISHES.filter(function(d){
    return d.name.toLowerCase().indexOf(q)>-1
      ||(d.ingr&&d.ingr.toLowerCase().indexOf(q)>-1)
      ||(d.allergens&&d.allergens.join(' ').indexOf(q)>-1)
      ||(d.method&&d.method.toLowerCase().indexOf(q)>-1)
      ||(d.sauces_served&&d.sauces_served.toLowerCase().indexOf(q)>-1);
  });
  if(!results.length){sr.innerHTML='<div class="no-results">No results for "'+q+'"</div>';return;}
  var html='<div class="sec-label">'+results.length+' result'+(results.length!==1?'s':'')+'</div><div class="grid">';
  for(var i=0;i<results.length;i++) html+=makeDC(results[i]);
  html+='</div>';
  sr.innerHTML=html;
}

renderTab();
